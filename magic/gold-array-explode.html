    <script type="module">
        import * as THREE from 'three';

        const HANDS_DATA = [{ active: false, x: 0.5, y: 0.5, size: 0.2, targetRotX: 0, targetRotY: 0 }, { active: false, x: 0.5, y: 0.5, size: 0.2, targetRotX: 0, targetRotY: 0 }];
        let scene, camera, renderer, magicCircles = [];
        const CAMERA_Z = 14; 
        let time = 0;

        // 粗粒子贴图
        function getParticleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
            grad.addColorStop(0, 'rgba(255, 255, 255, 1)');
            grad.addColorStop(0.2, 'rgba(255, 220, 100, 0.95)');
            grad.addColorStop(0.5, 'rgba(255, 80, 0, 0.5)');
            grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 128, 128);
            ctx.fillStyle = 'rgba(255, 255, 255, 1.0)';
            ctx.beginPath();
            ctx.arc(64, 64, 10, 0, Math.PI * 2); 
            ctx.fill();
            return new THREE.CanvasTexture(canvas);
        }

        function getGlowTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(128, 128, 0, 128, 128, 128);
            grad.addColorStop(0, 'rgba(255, 120, 0, 0.7)'); // 降低了背景辉光避免刺眼
            grad.addColorStop(0.4, 'rgba(200, 40, 0, 0.3)');
            grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 256, 256);
            return new THREE.CanvasTexture(canvas);
        }

        // ================== 几何生成引擎 ==================
        // [修改] 支持真正的3D两点连线，用于绘制三棱锥
        function createLine(x1, y1, x2, y2, density, z1 = 0, z2 = 0) {
            const pos = [];
            const dist = Math.sqrt((x2-x1)**2 + (y2-y1)**2 + (z2-z1)**2);
            const count = Math.max(2, Math.floor(dist * density));
            for (let i = 0; i < count; i++) { 
                const t = i / count; 
                pos.push(x1 + (x2 - x1)*t, y1 + (y2 - y1)*t, z1 + (z2 - z1)*t); 
            }
            return pos;
        }

        function createRing(radius, count, jitter = 0) {
            const pos = [];
            for (let i = 0; i < count; i++) {
                const angle = (i / count) * Math.PI * 2;
                const r = radius + (Math.random() - 0.5) * jitter;
                pos.push(Math.cos(angle) * r, Math.sin(angle) * r, (Math.random()-0.5)*0.01);
            }
            return pos;
        }

        function createDashedRing(radius, count, dashCount, dashRatio) {
            const pos = [];
            for (let i = 0; i < count; i++) {
                const angle = (i / count) * Math.PI * 2;
                const segmentPhase = (angle / (Math.PI * 2)) * dashCount;
                if (segmentPhase - Math.floor(segmentPhase) < dashRatio) {
                    pos.push(Math.cos(angle) * radius, Math.sin(angle) * radius, 0);
                }
            }
            return pos;
        }

        function createStar(innerR, outerR, points, density) {
            const pos = [];
            const step = Math.PI / points;
            for(let i=0; i<points*2; i++) {
                const r1 = (i%2 === 0) ? outerR : innerR;
                const r2 = ((i+1)%2 === 0) ? outerR : innerR;
                const a1 = i * step - Math.PI/2;
                const a2 = (i+1) * step - Math.PI/2;
                pos.push(...createLine(Math.cos(a1)*r1, Math.sin(a1)*r1, Math.cos(a2)*r2, Math.sin(a2)*r2, density));
            }
            return pos;
        }

        function createEnergyCoil(R, r, turns, points) {
            const pos = [];
            for(let i=0; i<points; i++) {
                const t = (i/points) * Math.PI * 2;
                const x = (R + r * Math.cos(turns * t)) * Math.cos(t);
                const y = (R + r * Math.cos(turns * t)) * Math.sin(t);
                const z = r * Math.sin(turns * t);
                pos.push(x, y, z);
            }
            return pos;
        }

        function createPolygon(radius, sides, offsetAngle, density) {
            const pos = [];
            for (let i = 0; i < sides; i++) {
                const a1 = offsetAngle + (i / sides) * Math.PI * 2;
                const a2 = offsetAngle + ((i + 1) / sides) * Math.PI * 2;
                pos.push(...createLine(Math.cos(a1)*radius, Math.sin(a1)*radius, Math.cos(a2)*radius, Math.sin(a2)*radius, density));
            }
            return pos;
        }

        function createSpirograph(R, r, d, loops, pointsPerLoop) {
            const pos = [];
            const total = loops * pointsPerLoop;
            for(let i=0; i<total; i++) {
                const t = (i / pointsPerLoop) * Math.PI * 2;
                const x = (R - r) * Math.cos(t) + d * Math.cos(((R - r) / r) * t);
                const y = (R - r) * Math.sin(t) - d * Math.sin(((R - r) / r) * t);
                pos.push(x, y, 0);
            }
            return pos;
        }

        // [新增] 创建立体的星形四面体（两个交错的三棱锥：梅尔卡巴）
        function createMerkaba(radius, density) {
            const pos = [];
            const r = radius;
            const sqrt2_3 = Math.sqrt(2/3);
            const sqrt2_9 = Math.sqrt(2)/3;
            const sqrt8_9 = Math.sqrt(8)/3;

            // 正向三棱锥顶点
            const t1 = [
                [0, r, 0],
                [-r*sqrt2_3, -r/3, r*sqrt2_9],
                [r*sqrt2_3, -r/3, r*sqrt2_9],
                [0, -r/3, -r*sqrt8_9]
            ];
            
            // 倒向三棱锥顶点
            const t2 = [
                [0, -r, 0],
                [r*sqrt2_3, r/3, -r*sqrt2_9],
                [-r*sqrt2_3, r/3, -r*sqrt2_9],
                [0, r/3, r*sqrt8_9]
            ];

            const addTetra = (v) => {
                const edges = [[0,1],[0,2],[0,3],[1,2],[2,3],[3,1]];
                edges.forEach(e => {
                    // 使用修改后的带Z轴的 createLine
                    pos.push(...createLine(v[e[0]][0], v[e[0]][1], v[e[1]][0], v[e[1]][1], density, v[e[0]][2], v[e[1]][2]));
                });
            };

            addTetra(t1);
            addTetra(t2);
            return pos;
        }

        function buildGeometry(positions) {
            const geom = new THREE.BufferGeometry();
            geom.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            return geom;
        }

        function initThree() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.z = CAMERA_Z;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            const pt = getParticleTexture();
            const gt = getGlowTexture();
            
            // 粗厚材质
            const mUltra = new THREE.PointsMaterial({ color: 0xffffff, size: 0.35, map: pt, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, opacity: 1.0 });
            const mGold  = new THREE.PointsMaterial({ color: 0xffcc00, size: 0.28, map: pt, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, opacity: 0.95 });
            const mFire  = new THREE.PointsMaterial({ color: 0xff4400, size: 0.22, map: pt, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, opacity: 0.9 });
            const mRune  = new THREE.PointsMaterial({ color: 0xffaa44, size: 0.30, map: pt, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, opacity: 0.9 });
            const mAura  = new THREE.PointsMaterial({ color: 0xff1100, size: 0.60, map: pt, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, opacity: 0.25 });
            const mBlue  = new THREE.PointsMaterial({ color: 0x00ffff, size: 0.25, map: pt, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, opacity: 0.8 }); 

            for(let i=0; i<2; i++) {
                const group = new THREE.Group();
                
                // [0] 底层核爆辉光 (亮度已调低)
                const glow = new THREE.Sprite(new THREE.SpriteMaterial({ map: gt, color: 0xff6600, transparent: true, blending: THREE.AdditiveBlending, opacity: 0.5 }));
                glow.scale.set(6.0, 6.0, 1);
                glow.position.z = -1;
                group.add(glow);

                // [1] 巨型星尘外光晕 (Aura)
                group.add(new THREE.Points(buildGeometry(createRing(2.0, 3000, 0.5)), mAura));
                
                // [2] 外部能量缠绕线圈
                group.add(new THREE.Points(buildGeometry(createEnergyCoil(1.8, 0.15, 64, 4000)), mGold));

                // [3] 外围主保护环 
                group.add(new THREE.Points(buildGeometry([...createRing(1.7, 2000), ...createRing(1.67, 2000)]), mUltra));

                // [4] 外层十二芒星法阵
                group.add(new THREE.Points(buildGeometry(createStar(1.4, 1.7, 12, 150)), mFire));

                // [5] 复杂符文刻度带
                group.add(new THREE.Points(buildGeometry(createDashedRing(1.55, 3000, 72, 0.6)), mRune));

                // [6] 中层内相切齿轮 
                group.add(new THREE.Points(buildGeometry(createSpirograph(1.4, 0.12, 0.5, 40, 250)), mFire));

                // [7] 中层八芒星
                group.add(new THREE.Points(buildGeometry(createStar(0.9, 1.35, 8, 200)), mGold));

                // [8] 内部圆环
                group.add(new THREE.Points(buildGeometry(createRing(0.85, 1500, 0.02)), mUltra));

                // [9-10] 核心青蓝色魔法结界
                group.add(new THREE.Points(buildGeometry(createPolygon(0.8, 6, 0, 300)), mBlue));
                group.add(new THREE.Points(buildGeometry(createPolygon(0.8, 6, Math.PI/6, 300)), mBlue));

                // [11-13] 外层大型 3D 浑天仪交叉轨道 
                const astroX = new THREE.Points(buildGeometry(createDashedRing(1.9, 2000, 24, 0.8)), mGold);
                const astroY = new THREE.Points(buildGeometry(createDashedRing(1.9, 2000, 24, 0.8)), mFire);
                const astroZ = new THREE.Points(buildGeometry(createRing(1.9, 2000)), mRune);
                group.add(astroX); group.add(astroY); group.add(astroZ);

                // ================= [核心重构区] =================

                // [14-15] 内层精密浑天仪轨道 (替代原本密集的符文圈)
                const coreRingX = new THREE.Points(buildGeometry(createDashedRing(0.45, 1000, 12, 0.7)), mUltra);
                const coreRingY = new THREE.Points(buildGeometry(createDashedRing(0.40, 1000, 8, 0.6)), mGold);
                group.add(coreRingX); group.add(coreRingY);

                // [16] 绝对中心：立体星形四面体 (替代刺眼的星尘云)
                // 纯白高能量结晶，密度调高让线条厚重
                const merkabaCore = new THREE.Points(buildGeometry(createMerkaba(0.25, 1000)), mUltra);
                group.add(merkabaCore);

                // 保存图层引用及Z轴基础展开距离 (3D轨道和核心几何体不参与摊平)
                group.userData = {
                    layers: group.children,
                    baseZOffsets: [ -1, -0.8, 0, 0.1, 0.2, 0.15, 0.3, 0.4, 0.5, 0.6, 0.6, 0,0,0, 0,0, 0 ]
                };

                group.visible = false; 
                scene.add(group); 
                magicCircles.push(group);
            }
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            time += 0.01; 
            
            const vFov = camera.fov * Math.PI / 180;
            const viewHeight = 2 * Math.tan(vFov / 2) * CAMERA_Z;
            const viewWidth = viewHeight * camera.aspect;

            for(let i=0; i<2; i++) {
                const circle = magicCircles[i];
                const data = HANDS_DATA[i];
                const layers = circle.userData.layers;

                if(data.active) {
                    circle.visible = true;
                    
                    circle.position.x += ((data.x - 0.5) * viewWidth - circle.position.x) * 0.15;
                    circle.position.y += (-(data.y - 0.5) * viewHeight - circle.position.y) * 0.15;
                    
                    // 缓慢深呼吸缩放
                    const breath = 1.0 + Math.sin(time * 1.5) * 0.03; 
                    const finalScale = data.size * viewHeight * 0.65 * breath;
                    circle.scale.lerp(new THREE.Vector3(finalScale, finalScale, finalScale), 0.15);

                    layers[0].material.opacity = 0.4 + Math.sin(time * 3) * 0.1;

                    // 平稳外围旋转
                    const t = time;
                    layers[1].rotation.z = t * 0.02;  
                    layers[2].rotation.z = -t * 0.05; 
                    layers[3].rotation.z = t * 0.08;  
                    layers[4].rotation.z = t * 0.04; 
                    layers[5].rotation.z = -t * 0.1;  
                    layers[6].rotation.z = t * 0.15;  
                    layers[7].rotation.z = -t * 0.08; 
                    layers[8].rotation.z = t * 0.25;   
                    layers[9].rotation.z = -t * 0.15;
                    layers[10].rotation.z = t * 0.15;

                    // 外侧浑天仪
                    layers[11].rotation.x = t * 0.6;
                    layers[11].rotation.y = t * 0.2;
                    layers[12].rotation.y = -t * 0.5;
                    layers[12].rotation.z = t * 0.3;
                    layers[13].rotation.x = -t * 0.3;
                    layers[13].rotation.z = -t * 0.6;

                    // 中心微型浑天仪独立立体转动
                    layers[14].rotation.x = t * 0.8;
                    layers[14].rotation.y = -t * 0.4;
                    layers[15].rotation.y = t * 0.7;
                    layers[15].rotation.z = t * 0.5;

                    // [新增] 核心立体三棱锥（梅尔卡巴）平滑自转，极具真理的审判感
                    layers[16].rotation.x = t * 0.5;
                    layers[16].rotation.y = t * 0.5;
                    layers[16].rotation.z = t * 0.2;

                    // Z轴折叠展开排除了 3D 轨道和中心核心体 (idx >= 11)
                    const depthSpread = 1.1 + Math.sin(t * 0.8) * 0.15; 
                    circle.userData.baseZOffsets.forEach((offset, idx) => {
                        if(idx < 11) {
                            layers[idx].position.z = offset * depthSpread;
                        }
                    });

                    // 倾斜跟随
                    data.targetRotX = (data.y - 0.5) * 2.0;
                    data.targetRotY = (data.x - 0.5) * 2.0;
                    circle.rotation.x += (data.targetRotX - circle.rotation.x) * 0.1;
                    circle.rotation.y += (data.targetRotY - circle.rotation.y) * 0.1;

                } else {
                    circle.scale.lerp(new THREE.Vector3(0.001, 0.001, 0.001), 0.1);
                    circle.rotation.z += 0.1; 
                    circle.rotation.x += 0.05;
                    if(circle.scale.x < 0.02) circle.visible = false;
                }
            }
            renderer.render(scene, camera);
        }

        function updateHUD(text, color = "#ffcc00", glow = "#ff5500") {
            const hud = document.getElementById('hud-status');
            hud.innerText = text;
            hud.style.color = color;
            hud.style.borderColor = color;
            hud.style.boxShadow = `0 0 30px ${glow}`; 
        }

        async function startSystem() {
            document.getElementById('intro-panel').style.opacity = '0';
            setTimeout(() => document.getElementById('intro-panel').style.display = 'none', 500);
            
            const hud = document.getElementById('hud-status');
            hud.classList.remove('hidden');
            updateHUD("正在构建多维空间矩阵...", "#ffaa00");

            try {
                initThree();

                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    throw new Error("请在HTTPS或本地服务器(Live Server)环境下运行！");
                }

                updateHUD("请求虚空视野 (请允许摄像头)...", "#ffcc00");
                const videoElement = document.getElementById('input-video');
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 1280, height: 720 }});
                videoElement.srcObject = stream;
                await new Promise(resolve => videoElement.onloadedmetadata = resolve);
                videoElement.play();

                updateHUD("正在下载圣金神律引擎 (约需10-20秒)...", "#ffaa00", "#ff0000");
                const hands = new Hands({locateFile: (file) => ({"hands.binarypb": "../lib/mediapipe/hands/hands.binarypb", "hands_solution_packed_assets_loader.js": "../lib/mediapipe/hands/hands_solution_packed_assets_loader.js", "hands_solution_packed_assets.data": "../lib/mediapipe/hands/hands_solution_packed_assets.data", "hands_solution_simd_wasm_bin.js": "../lib/mediapipe/hands/hands_solution_simd_wasm_bin.js", "hands_solution_wasm_bin.js": "../lib/mediapipe/hands/hands_solution_wasm_bin.js", "hands_solution_simd_wasm_bin.wasm": "../lib/mediapipe/hands/hands_solution_simd_wasm_bin.wasm", "hands_solution_wasm_bin.wasm": "../lib/mediapipe/hands/hands_solution_wasm_bin.wasm", "hand_landmark_full.tflite": "../lib/mediapipe/hands/hand_landmark_full.tflite", "hand_landmark_lite.tflite": "../lib/mediapipe/hands/hand_landmark_lite.tflite"})[file] || file});
                hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

                hands.onResults((results) => {
                    HANDS_DATA.forEach(h => h.active = false);

                    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                        updateHUD(`共鸣完成: 锁定 ${results.multiHandLandmarks.length} 个空间锚点`, "#00ffff", "#0088ff");
                        
                        results.multiHandLandmarks.forEach((landmarks, index) => {
                            if (index < 2) {
                                const wrist = landmarks[0];
                                const middleBase = landmarks[9];
                                const middleTip = landmarks[12];
                                
                                HANDS_DATA[index].active = true;
                                HANDS_DATA[index].x = 1.0 - (wrist.x + middleBase.x) / 2;
                                HANDS_DATA[index].y = (wrist.y + middleBase.y) / 2;
             
                                const dx = wrist.x - middleTip.x;
                                const dy = wrist.y - middleTip.y;
                                HANDS_DATA[index].size = Math.sqrt(dx*dx + dy*dy);
                            }
                        });
                    } else {
                        updateHUD("空间游离: 未检测到施法者", "#ff0044", "#ff0000");
                    }
                });

                const cameraUtils = new Camera(videoElement, {
                    onFrame: async () => { await hands.send({ image: videoElement }); },
                    width: 1280, height: 720
                });
                await cameraUtils.start();

            } catch (err) {
                console.error(err);
                updateHUD(`❌ 领域崩溃: ${err.message}`, "#ff0000", "#ff0000");
            }
        }

        document.getElementById('start-btn').addEventListener('click', startSystem);

        window.addEventListener('resize', () => {
            if(camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
