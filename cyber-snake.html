<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛博龙贪吃蛇小游戏 - 赛博粒子交互</title>
    <script src="lib/mediapipe/camera_utils.js" crossorigin="anonymous"></script>
    <script src="lib/mediapipe/hands.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        video { display: none; } 
        canvas { display: block; width: 100vw; height: 100vh; transform: scaleX(-1); }
        #ui { position: absolute; top: 30px; left: 40px; color: white; z-index: 10; pointer-events: none; }
        h1 { margin: 0; font-size: 40px; letter-spacing: 4px; text-shadow: 0 0 20px currentColor; font-weight: 900; }
        p { margin: 8px 0; font-size: 22px; letter-spacing: 2px; text-shadow: 0 0 10px currentColor; font-weight: bold; }
    </style>

    <meta name="description" content="赛博朋克风格全息贪吃蛇小游戏，在线挑战高分并分享给朋友。">
    <meta name="keywords" content="互动特效,粒子特效,告白网页,祝福生成器,赛博朋克小游戏,手势识别,魔法阵,剑阵特效">
    <meta name="robots" content="index,follow">
    <meta property="og:title" content="赛博龙贪吃蛇小游戏 - 赛博粒子交互">
    <meta property="og:description" content="赛博朋克风格全息贪吃蛇小游戏，在线挑战高分并分享给朋友。">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="赛博粒子交互">
    <meta property="og:url" content="https://huyansheng3.github.io/cyber-particle-interaction/cyber-snake.html">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="canonical" href="https://huyansheng3.github.io/cyber-particle-interaction/cyber-snake.html">
    <link rel="stylesheet" href="assets/site-enhance.css">
    <script src="assets/site-enhance.js" defer></script>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>
<body>
    <div id="ui">
        <h1 id="scoreDisplay" style="color: #00ffff;">SCORE: 0</h1>
        <p id="phaseDisplay" style="color: #00ffff;">STAGE 1: NEON SERPENT</p>
    </div>
    <video id="videoElement" autoplay playsinline></video>
    <canvas id="canvasElement"></canvas>

    <script>
        const videoElement = document.getElementById('videoElement');
        const canvasElement = document.getElementById('canvasElement');
        const ctx = canvasElement.getContext('2d', { alpha: false });
        
        let width = window.innerWidth;
        let height = window.innerHeight;
        canvasElement.width = width;
        canvasElement.height = height;
        
        // --- 游戏核心变量 ---
        let score = 0;
        let targetLength = 30; 
        let snakeBody = [];
        let targetX = width / 2, targetY = height / 2;
        let currentX = width / 2, currentY = height / 2;
        let food = { x: Math.random()*(width-200)+100, y: Math.random()*(height-200)+100, hue: 140 };
        
        let videoFrame = null;
        let currentLandmarks = null; // 缓存手部骨架数据
        let particles = [];      
        let shockwaves = [];     
        let shakeFrames = 0;
        let globalHue = 180;     
        let keyboardVX = 0;
        let keyboardVY = 0;

        // MediaPipe 手部 5 条手指的骨骼连线索引定义
        const HAND_CONNECTIONS = [
            [0, 1], [1, 2], [2, 3], [3, 4],       // 大拇指
            [0, 5], [5, 6], [6, 7], [7, 8],       // 食指
            [9, 10], [10, 11], [11, 12],          // 中指连线基准
            [13, 14], [14, 15], [15, 16],         // 无名指
            [0, 17], [17, 18], [18, 19], [19, 20], // 小指
            [5, 9], [9, 13], [13, 17]             // 指根掌心连线
        ];

        function lerp(start, end, amt) { return (1 - amt) * start + amt * end; }
        function randomGauss(mean=0, stdev=1) {
            let u = 1 - Math.random(), v = Math.random();
            let z = Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
            return z * stdev + mean;
        }

        function getEvolutionTheme() {
            if(score < 50) return { hue: 180, name: "STAGE 1: NEON SERPENT", speed: 0.25 }; 
            if(score < 100) return { hue: 300, name: "STAGE 2: VOID DRAGON", speed: 0.35 }; 
            if(score < 200) return { hue: 25, name: "STAGE 3: CYBER GOD", speed: 0.45 };    
            return { hue: (Date.now() / 10) % 360, name: "FINAL: OVERLORD", speed: 0.5 };   
        }

        function spawnExplosion(x, y, color) {
            for(let i=0; i<40; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 6 + 3;
                particles.push({
                    x: x, y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    radius: Math.random() * 3 + 1.5,
                    alpha: 1,
                    decay: Math.random() * 0.03 + 0.01,
                    color: color
                });
            }
        }

        function eatFood() {
            score += 10;
            targetLength = Math.min(150, targetLength + 8);
            shakeFrames = 10; 
            
            const theme = getEvolutionTheme();
            const currentThemeColor = `hsl(${theme.hue}, 100%, 60%)`;
            
            spawnExplosion(food.x, food.y, currentThemeColor);
            shockwaves.push({ x: food.x, y: food.y, radius: 0, maxRadius: 180, width: 6 });
            
            food = { 
                x: Math.random()*(width-200)+100, 
                y: Math.random()*(height-200)+100,
                hue: Math.random() * 360
            };
            
            const scoreUI = document.getElementById('scoreDisplay');
            const phaseUI = document.getElementById('phaseDisplay');
            scoreUI.innerText = `SCORE: ${score}`;
            phaseUI.innerText = theme.name;
            scoreUI.style.color = currentThemeColor;
            phaseUI.style.color = currentThemeColor;
        }

        // --- 主渲染循环 ---
        function renderLoop() {
            const theme = getEvolutionTheme();
            globalHue = lerp(globalHue, theme.hue, 0.1); 
            
            currentX = lerp(currentX, targetX, theme.speed);
            currentY = lerp(currentY, targetY, theme.speed);
            
            snakeBody.push({x: currentX, y: currentY});
            if(snakeBody.length > targetLength) snakeBody.shift();

            if(Math.hypot(currentX - food.x, currentY - food.y) < 60) eatFood();

            // 喷射尾迹粒子
            if(Math.hypot(currentX - targetX, currentY - targetY) > 8) {
                const tailAngle = snakeBody.length > 2 ? Math.atan2(currentY - snakeBody[snakeBody.length-2].y, currentX - snakeBody[snakeBody.length-2].x) : 0;
                particles.push({
                    x: currentX, y: currentY,
                    vx: -Math.cos(tailAngle + (Math.random()-0.5)) * (Math.random()*3 + 1),
                    vy: -Math.sin(tailAngle + (Math.random()-0.5)) * (Math.random()*3 + 1),
                    radius: Math.random() * 2.5 + 1,
                    alpha: 0.7,
                    decay: 0.02,
                    color: `hsl(${globalHue}, 100%, 70%)`
                });
            }

            // 环境滤镜底噪与震动
            ctx.globalCompositeOperation = 'source-over';
            ctx.save();
            if(shakeFrames > 0) {
                ctx.translate((Math.random()-0.5)*shakeFrames*3, (Math.random()-0.5)*shakeFrames*3);
                shakeFrames--;
            }
            
            // 【优化1：调亮屏幕】大幅提高视频帧的透明度（0.25 -> 0.65），让环境和人脸清晰可见
            if(videoFrame) {
                ctx.globalAlpha = 0.65; 
                ctx.drawImage(videoFrame, 0, 0, width, height);
                ctx.globalAlpha = 1.0;
            }
            
            // 【优化1：调亮屏幕】将原来死黑的遮罩层改为极低饱和度的半透明幽蓝色调，既保证霓虹对比度，又不会让屏幕变暗
            ctx.fillStyle = "rgba(4, 6, 15, 0.45)"; 
            ctx.fillRect(0, 0, width, height);

            // 开启加法混合（发光模式）
            ctx.globalCompositeOperation = 'lighter';

            // 1. 渲染粒子系统
            for(let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy;
                p.alpha -= p.decay;
                if(p.alpha <= 0) { particles.splice(i, 1); continue; }
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.alpha;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill();
            }
            ctx.globalAlpha = 1.0;

            // 2. 渲染冲击波
            for(let i = shockwaves.length - 1; i >= 0; i--) {
                let sw = shockwaves[i];
                sw.radius += 8;
                if(sw.radius > sw.maxRadius) { shockwaves.splice(i, 1); continue; }
                ctx.beginPath();
                ctx.arc(sw.x, sw.y, sw.radius, 0, Math.PI*2);
                ctx.strokeStyle = `hsla(${globalHue}, 100%, 70%, ${1 - sw.radius/sw.maxRadius})`;
                ctx.lineWidth = sw.width;
                ctx.stroke();
            }

            // 3. 渲染食物
            const pulse = Math.sin(Date.now() / 100) * 6;
            ctx.shadowBlur = 25;
            ctx.shadowColor = `hsl(${food.hue}, 100%, 50%)`;
            ctx.strokeStyle = `hsl(${food.hue}, 100%, 60%)`;
            ctx.lineWidth = 4;
            ctx.beginPath(); ctx.arc(food.x, food.y, 16 + pulse, 0, Math.PI*2); ctx.stroke();
            ctx.fillStyle = "#ffffff";
            ctx.beginPath(); ctx.arc(food.x, food.y, 7, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;

            // 4. 渲染神龙
            const totalNodes = snakeBody.length;
            if(totalNodes > 5) {
                ctx.shadowBlur = 20;
                ctx.shadowColor = `hsl(${globalHue}, 100%, 50%)`;
                
                for(let i=1; i<totalNodes; i++) {
                    ctx.beginPath();
                    ctx.moveTo(snakeBody[i-1].x, snakeBody[i-1].y);
                    ctx.lineTo(snakeBody[i].x, snakeBody[i].y);
                    ctx.strokeStyle = `hsl(${(globalHue + i*0.8)%360}, 100%, 65%)`;
                    ctx.lineWidth = (i / totalNodes) * 12 + 2; 
                    ctx.stroke();
                }
                ctx.shadowBlur = 0;

                // 星尘风暴
                for(let i=0; i<totalNodes; i+=2) {
                    const pt = snakeBody[i];
                    const ratio = i / totalNodes;
                    const thick = Math.sin(ratio * Math.PI);
                    const baseRadius = (22 + (score/6)) * thick + 4;
                    
                    ctx.fillStyle = `hsl(${(globalHue + i)%360}, 100%, 70%)`;
                    for(let p=0; p<8; p++) {
                        const px = pt.x + randomGauss(0, baseRadius * 0.7);
                        const py = pt.y + randomGauss(0, baseRadius * 0.7);
                        ctx.beginPath();
                        ctx.arc(px, py, Math.random() * (ratio * 2.5 + 1), 0, Math.PI*2);
                        ctx.fill();
                    }
                }
                
                // 龙头与龙角
                const head = snakeBody[totalNodes-1];
                const tail = snakeBody[Math.max(0, totalNodes-6)];
                const angle = Math.atan2(head.y - tail.y, head.x - tail.x);
                
                ctx.fillStyle = "#ffffff";
                ctx.shadowBlur = 25;
                ctx.shadowColor = `hsl(${globalHue}, 100%, 60%)`;
                ctx.beginPath(); ctx.arc(head.x, head.y, 15, 0, Math.PI*2); ctx.fill();
                
                ctx.strokeStyle = `hsl(${globalHue}, 100%, 50%)`;
                ctx.lineWidth = 4;
                for(let side of [1, -1]) {
                    ctx.beginPath();
                    ctx.moveTo(head.x, head.y);
                    const hornAngle = angle + 2.4 * side;
                    ctx.lineTo(head.x + Math.cos(hornAngle)*40, head.y + Math.sin(hornAngle)*40);
                    ctx.stroke();
                }

                // 龙眼
                ctx.fillStyle = "#ffffff";
                for(let side of [1, -1]) {
                    const eyeAngle = angle + 0.6 * side;
                    const eyeX = head.x + Math.cos(eyeAngle) * 8;
                    const eyeY = head.y + Math.sin(eyeAngle) * 8;
                    ctx.beginPath(); ctx.arc(eyeX, eyeY, 2.5, 0, Math.PI*2); ctx.fill();
                }
                ctx.shadowBlur = 0;
            }

            // 【优化2：全息手部骨架渲染】
            if (currentLandmarks) {
                ctx.shadowBlur = 10;
                ctx.shadowColor = "#00ffcc"; // 科幻全息青色发光

                // A. 绘制骨骼连线
                ctx.strokeStyle = "rgba(0, 255, 200, 0.6)";
                ctx.lineWidth = 3;
                for (let connection of HAND_CONNECTIONS) {
                    const pt1 = currentLandmarks[connection[0]];
                    const pt2 = currentLandmarks[connection[1]];
                    if(pt1 && pt2) {
                        ctx.beginPath();
                        ctx.moveTo(pt1.x * width, pt1.y * height);
                        ctx.lineTo(pt2.x * width, pt2.y * height);
                        ctx.stroke();
                    }
                }

                // B. 绘制 21 个全息关节特征点
                for (let i = 0; i < currentLandmarks.length; i++) {
                    const lm = currentLandmarks[i];
                    ctx.beginPath();
                    ctx.arc(lm.x * width, lm.y * height, i === 8 ? 7 : 4, 0, Math.PI * 2); // 食指指尖(8)故意画大，突显控制点
                    // 食指指尖用亮白色，其余用全息青色
                    ctx.fillStyle = i === 8 ? "#ffffff" : "#00ffcc";
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
            }
            
            ctx.restore();
            requestAnimationFrame(renderLoop);
        }

        function enablePointerControls() {
            document.body.style.cursor = 'crosshair';
            const moveTarget = (clientX, clientY) => {
                targetX = width - clientX;
                targetY = clientY;
            };
            window.addEventListener('pointermove', (event) => moveTarget(event.clientX, event.clientY));
            window.addEventListener('pointerdown', (event) => moveTarget(event.clientX, event.clientY));
            window.addEventListener('keydown', (event) => {
                const step = 70;
                if (event.key === 'ArrowLeft' || event.key.toLowerCase() === 'a') keyboardVX = step;
                if (event.key === 'ArrowRight' || event.key.toLowerCase() === 'd') keyboardVX = -step;
                if (event.key === 'ArrowUp' || event.key.toLowerCase() === 'w') keyboardVY = -step;
                if (event.key === 'ArrowDown' || event.key.toLowerCase() === 's') keyboardVY = step;
                targetX = Math.max(30, Math.min(width - 30, targetX + keyboardVX));
                targetY = Math.max(30, Math.min(height - 30, targetY + keyboardVY));
            });
        }

        async function startHandTracking() {
            const hands = new Hands({locateFile: (file) => ({"hands.binarypb": "lib/mediapipe/hands/hands.binarypb", "hands_solution_packed_assets_loader.js": "lib/mediapipe/hands/hands_solution_packed_assets_loader.js", "hands_solution_packed_assets.data": "lib/mediapipe/hands/hands_solution_packed_assets.data", "hands_solution_simd_wasm_bin.js": "lib/mediapipe/hands/hands_solution_simd_wasm_bin.js", "hands_solution_wasm_bin.js": "lib/mediapipe/hands/hands_solution_wasm_bin.js", "hands_solution_simd_wasm_bin.wasm": "lib/mediapipe/hands/hands_solution_simd_wasm_bin.wasm", "hands_solution_wasm_bin.wasm": "lib/mediapipe/hands/hands_solution_wasm_bin.wasm", "hand_landmark_full.tflite": "lib/mediapipe/hands/hand_landmark_full.tflite", "hand_landmark_lite.tflite": "lib/mediapipe/hands/hand_landmark_lite.tflite"})[file] || file});
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.65, minTrackingConfidence: 0.65 });
            
            hands.onResults((results) => {
                if (results.image) videoFrame = results.image;
                
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    currentLandmarks = results.multiHandLandmarks[0]; // 保存整只手的骨骼数据
                    
                    // 提取食指指尖控制神龙
                    const indexFinger = currentLandmarks[8];
                    targetX = indexFinger.x * width;
                    targetY = indexFinger.y * height;
                } else {
                    currentLandmarks = null; // 没牵手时清空骨架
                }
            });

            await hands.initialize();
            const camera = new Camera(videoElement, {
                onFrame: async () => { await hands.send({image: videoElement}); },
                width: 1280, height: 720
            });
            await camera.start();
        }

        startHandTracking().catch((error) => {
            console.warn('Hand tracking unavailable, pointer controls enabled.', error);
            currentLandmarks = null;
            enablePointerControls();
        });

        window.addEventListener('resize', () => {
            width = window.innerWidth; height = window.innerHeight;
            canvasElement.width = width; canvasElement.height = height;
        });

        renderLoop();
    </script>
</body>
</html>
